name: Build and Release Extension

on:
  push:
    tags:
      - "v*.*.*" # Trigger on version tags like v1.0.0

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Extension ZIP
        run: |
          mkdir dist

          # Copy necessary files for the Chrome Extension
          cp -r src icons manifest.json LICENSE README.md THIRD_PARTY_NOTICES.md PRIVACY.md dist/

          # Create zip archive
          cd dist
          zip -r ../claude-token-counter-extension.zip *
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: claude-token-counter-extension.zip
          generate_release_notes: true
